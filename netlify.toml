# Netlify configuration for TBC Solutions site
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "node scripts/build-deploy.js"
  publish = "dist"
  functions = "netlify/functions"


# Keep the frontend's existing /api/claude URL working on Netlify
# by transparently rewriting it to the Netlify Functions path.
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

# === Security: never serve internal / sensitive files ================
[[redirects]]
  from = "/.env*"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/.git/*"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/*.skill"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/cold-email-tool.html"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/*.bak.*"
  to = "/index.html"
  status = 404
  force = true
[[redirects]]
  from = "/api/claude.js"
  to = "/index.html"
  status = 404
  force = true

# === Cache-busting headers ===========================================
# HTML pages must never be cached by the browser/CDN so users always
# pick up the latest deploy. (Assets can keep default caching.)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static images can cache for 1 week (faster repeat visits, safe because
# image content changes far less often than the page itself).
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
